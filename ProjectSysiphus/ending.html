<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Sisyphus</title>
  <link rel="stylesheet" href="ending.css">
  <script src="ending.js" defer></script>
</head>

<body>
  <div class="viewport">

    <div id="farWorld" class="farWorld">
        <img class="farHill farA" src="images/endingBG.png" alt="">
        <img class="farHill farB" src="images/endingBG.png" alt="">
    </div>

    <div id="trackWorld" class="trackWorld">
        <img class="trackStrip trackA" src="images/endingTrack.png" alt="">
        <img class="trackStrip trackB" src="images/endingTrack.png" alt="">
        <img class="trackStrip trackC" src="images/endingTrack.png" alt="">
    </div>

    <div class="stage">
        <img class="cover" src="images/endingCV.png" alt="">
        <img id="stone" class="stoneImg" src="images/ai-Stone.png" alt="stone">
        <img id="figure" class="figureImg" src="images/ai-Sisyphus.png" alt="figure">
    </div>

    <div class="text">
        <p class="header">THE LOOP CONTINUES,</p>
        <p class="header">IN EVERY TIME, EVERY PLACE, EVERY LIFE.</p>
        <p id="instruc">THIS TIME, THERE IS NO SUMMIT TO REACH.<br>ONLY THE WORLD TO NOTICE.</p>
        <p id="counter">distance: 0</p>
    </div>

    <!-- <a id="nextLink" class="nextLink" href="microbe.html">
      the stone cracks open.
    </a> -->

  </div>
</body>
</html>
