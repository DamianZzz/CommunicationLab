<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene 03 Tree</title>
  <link rel="stylesheet" href="tree.css">
  <script src="tree.js" defer></script>
</head>
<body>
    <div class="scrollSpace">

        <div class="viewport">
            <div class="bgTransition">
                <img id="bg1" class="bgImage" src="images/ai-treeBG.png" alt="tree background">
                <img id="bg2" class="bgImage" src="images/ai-treeBG2.png" alt="tree background 2"> 
            </div>
            
            <div class="treeEffects">
                <div id="canopyGreen" class="canopy canopyGreen">
                <div class="blob g1"></div>
                <div class="blob g2"></div>
                <div class="blob g3"></div>
                <div class="blob g4"></div>
                <div class="blob g5"></div>
                <div class="blob g6"></div>
                <div class="blob g7"></div>
            </div>

            <div id="canopyGold" class="canopy canopyGold">
                <div class="blob y1"></div>
                <div class="blob y2"></div>
                <div class="blob y3"></div>
                <div class="blob y4"></div>
                <div class="blob y5"></div>
                <div class="blob y6"></div>
                <div class="blob y7"></div>

            </div>

            <img id="highlightLeaf" class="highlightLeaf" src="images/leaf.png" alt="">
            <img id="newLeaf" class="newLeaf" src="images/leaf.png" alt="">
        </div>

            <div id="snowLayer" class="snowLayer"></div>
            <div id="snowGround" class="snowGround"></div>

            <div class="text">
                <p class="header">SCENE 03: TREE</p>
                <p id="seasonText">I followed the leaf, and found a tree.</p>
                <p id="progressText">scroll to pass time</p>
            </div>

            <a id="nextLink" class="nextLink" href="human.html">
                still no answer. maybe I have stayed here too long.
            </a>
        </div>

    </div>
</body>
</html>
