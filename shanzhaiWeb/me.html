<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <a class="logo" href="#">
            <img src="pics/logo.png" alt="XHS" />
        </a>        

        <div class="search">
            <input type="text" placeholder="Search" />
            <button class="icon-btn" aria-label="search">🔍</button>
        </div>

        <nav class="top-actions">
            <a href="#" class="text-link">Creative Hub</a>
            <a href="#" class="text-link">Cooperation</a>
            <button class="icon-btn" aria-label="menu">≡</button>
        </nav>
    </header>
    
    <div class="app">
        <aside class="sidebar">
            <ul class="nav">
                <li class="nav-item">
                <a class="nav-link" href="index.html">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Discover</span>
                </a>
                </li>

                <li class="nav-item">
                <a class="nav-link" href="#">
                    <span class="nav-icon">📺</span>
                    <span class="nav-text">Live</span>
                </a>
                </li>

                <li class="nav-item">
                <a class="nav-link" href="#">
                    <span class="nav-icon">➕</span>
                    <span class="nav-text">Post</span>
                </a>
                </li>

                <li>
                <a class="nav-link " href="#">
                    <span class="nav-icon">🔔</span>
                    <span class="nav-text">Notifications</span>
                </a>
                </li>

                <li>
                <a class="nav-link active" href="me.html">
                    <span class="avatar">
                    <img src="pics/profile.png" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%;" />
                    </span>
                    <span class="nav-text">Me</span>
                </a>
                </li>
            </ul>

            <!-- 底部固定区 -->
            <div class="sidebar-bottom">
                <a class="nav-link" href="#">
                <span class="nav-icon">≡</span>
                <span class="nav-text">More</span>
                </a>
            </div>
        </aside>      
        
        <main class="profile-container">
            <section class="profile-header">
                <div class="user-info-wrapper">
                    <div class="large-avatar">
                        <img src="pics/profile.png" alt="头像">
                    </div>
                    <div class="user-detail">
                        <h1 class="user-nickname">damianZzz</h1>
                        <p class="user-id">小红书号：3853432709</p>
                        <p class="user-desc">hujololaso</p>
                        <div class="user-stats">
                            <span><b>36</b> 关注</span>
                            <span><b>15</b> 粉丝</span>
                            <span><b>1</b> 获赞与收藏</span>
                        </div>
                    </div>
                </div>
            </section>
            
            <nav class="profile-tabs">
                <span class="tab-item active">笔记</span>
                <span class="tab-item">收藏</span>
                <span class="tab-item">点赞</span>
            </nav>

            <div class="profile-feed">
                <a href="post1.html" class="post-card">
                    <img src="pics/post1.jpg" alt="Post 1" />
                    <div class="post-info">
                    <p class="post-title">This is the First post</p>
                    <div class="post-description">
                        <span class="post-author">Xiao Ming</span>
                        <span class="post-stats">100 likes · 20 comments</span>
                    </div>
                    </div>
                </a>  
                             
            </div>
        </main>
    </div>
</body>
</html>
